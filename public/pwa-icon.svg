<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient matching card back -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3a3f52"/>
      <stop offset="100%" stop-color="#282c3a"/>
    </linearGradient>
    <!-- Rainbow gradient for the "1" and inner rounded rect -->
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="25%" stop-color="#facc15"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="75%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Subtle inner shadow -->
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
    </radialGradient>
  </defs>

  <!-- Card background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle vignette overlay -->
  <rect width="512" height="512" rx="96" fill="url(#vignette)"/>

  <!-- Centered rounded rectangle outline with equal padding -->
  <rect x="80" y="156" width="352" height="200" rx="24" fill="none" stroke="url(#rainbow)" stroke-width="5" opacity="0.85"/>

  <!-- Name "ORIEL ABSIN" in two rows, per-letter UNO colors -->
  <text x="256" y="248" text-anchor="middle" font-family="'Arial Rounded MT Bold','Nunito','Quicksand',Arial,sans-serif" font-weight="800" font-size="72" letter-spacing="6">
    <tspan fill="#ef4444">O</tspan><tspan fill="#eab308">R</tspan><tspan fill="#22c55e">I</tspan><tspan fill="#3b82f6">E</tspan><tspan fill="#ef4444">L</tspan>
  </text>
  <text x="256" y="326" text-anchor="middle" font-family="'Arial Rounded MT Bold','Nunito','Quicksand',Arial,sans-serif" font-weight="800" font-size="72" letter-spacing="6">
    <tspan fill="#eab308">A</tspan><tspan fill="#22c55e">B</tspan><tspan fill="#3b82f6">S</tspan><tspan fill="#ef4444">I</tspan><tspan fill="#eab308">N</tspan>
  </text>
</svg>
