<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3a3f52"/>
      <stop offset="100%" stop-color="#282c3a"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="25%" stop-color="#facc15"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="75%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Scattered UNO cards in the background -->
  <g opacity="0.35">
    <!-- Top-left area -->
    <g transform="translate(60,40) rotate(-20,40,56)">
      <rect width="80" height="112" rx="8" fill="#ef4444"/>
      <text x="40" y="68" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="36" fill="white">7</text>
    </g>
    <g transform="translate(170,-10) rotate(15,40,56)">
      <rect width="80" height="112" rx="8" fill="#3b82f6"/>
      <text x="40" y="68" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="36" fill="white">3</text>
    </g>
    <g transform="translate(20,180) rotate(25,40,56)">
      <rect width="80" height="112" rx="8" fill="#eab308"/>
      <text x="40" y="68" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="36" fill="white">5</text>
    </g>

    <!-- Top-right area -->
    <g transform="translate(980,20) rotate(22,40,56)">
      <rect width="80" height="112" rx="8" fill="#22c55e"/>
      <text x="40" y="68" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="36" fill="white">6</text>
    </g>
    <g transform="translate(1080,80) rotate(-18,40,56)">
      <rect width="80" height="112" rx="8" fill="#ef4444"/>
      <text x="40" y="68" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="36" fill="white">2</text>
    </g>
    <g transform="translate(1050,-20) rotate(8,40,56)">
      <rect width="80" height="112" rx="8" fill="#eab308"/>
      <text x="40" y="68" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="36" fill="white">9</text>
    </g>

    <!-- Bottom-left area -->
    <g transform="translate(30,440) rotate(-12,40,56)">
      <rect width="80" height="112" rx="8" fill="#22c55e"/>
      <text x="40" y="68" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="36" fill="white">4</text>
    </g>
    <g transform="translate(150,490) rotate(18,40,56)">
      <rect width="80" height="112" rx="8" fill="#3b82f6"/>
      <text x="40" y="68" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="36" fill="white">1</text>
    </g>
    <g transform="translate(100,340) rotate(-28,40,56)">
      <rect width="80" height="112" rx="8" fill="#ef4444"/>
      <text x="40" y="66" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="28" fill="white">Skip</text>
    </g>

    <!-- Bottom-right area -->
    <g transform="translate(1020,420) rotate(14,40,56)">
      <rect width="80" height="112" rx="8" fill="#eab308"/>
      <text x="40" y="68" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="36" fill="white">8</text>
    </g>
    <g transform="translate(1100,320) rotate(-22,40,56)">
      <rect width="80" height="112" rx="8" fill="#22c55e"/>
      <text x="40" y="66" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="28" fill="white">+2</text>
    </g>
    <g transform="translate(1060,510) rotate(30,40,56)">
      <rect width="80" height="112" rx="8" fill="#3b82f6"/>
      <text x="40" y="68" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="36" fill="white">0</text>
    </g>

    <!-- Mid-left / mid-right scattered -->
    <g transform="translate(240,380) rotate(-8,40,56)">
      <rect width="80" height="112" rx="8" fill="#eab308"/>
      <text x="40" y="68" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="36" fill="white">6</text>
    </g>
    <g transform="translate(920,460) rotate(-16,40,56)">
      <rect width="80" height="112" rx="8" fill="#ef4444"/>
      <text x="40" y="68" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="36" fill="white">3</text>
    </g>
    <g transform="translate(280,60) rotate(10,40,56)">
      <rect width="80" height="112" rx="8" fill="#22c55e"/>
      <text x="40" y="68" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="36" fill="white">1</text>
    </g>
    <g transform="translate(880,30) rotate(-14,40,56)">
      <rect width="80" height="112" rx="8" fill="#3b82f6"/>
      <text x="40" y="66" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="28" fill="white">+4</text>
    </g>
  </g>

  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Centered rounded rectangle outline -->
  <rect x="370" y="120" width="460" height="260" rx="28" fill="none" stroke="url(#rainbow)" stroke-width="5" opacity="0.85"/>

  <!-- Name "ORIEL ABSIN" in two rows, per-letter UNO colors -->
  <text x="600" y="245" text-anchor="middle" font-family="'Arial Rounded MT Bold','Nunito','Quicksand',Arial,sans-serif" font-weight="800" font-size="86" letter-spacing="8">
    <tspan fill="#ef4444">O</tspan><tspan fill="#eab308">R</tspan><tspan fill="#22c55e">I</tspan><tspan fill="#3b82f6">E</tspan><tspan fill="#ef4444">L</tspan>
  </text>
  <text x="600" y="340" text-anchor="middle" font-family="'Arial Rounded MT Bold','Nunito','Quicksand',Arial,sans-serif" font-weight="800" font-size="86" letter-spacing="8">
    <tspan fill="#eab308">A</tspan><tspan fill="#22c55e">B</tspan><tspan fill="#3b82f6">S</tspan><tspan fill="#ef4444">I</tspan><tspan fill="#eab308">N</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="460" text-anchor="middle" font-family="'Arial Rounded MT Bold','Nunito','Quicksand',Arial,sans-serif" font-weight="600" font-size="28" letter-spacing="4" fill="#9ca3af">A PORTFOLIO YOU CAN PLAY</text>

  <!-- Decorative dots -->
  <g fill="#9ca3af" opacity="0.4">
    <circle cx="470" cy="460" r="3"/>
    <circle cx="482" cy="460" r="3"/>
    <circle cx="494" cy="460" r="3"/>
    <circle cx="506" cy="460" r="3"/>
    <circle cx="694" cy="460" r="3"/>
    <circle cx="706" cy="460" r="3"/>
    <circle cx="718" cy="460" r="3"/>
    <circle cx="730" cy="460" r="3"/>
  </g>

  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="'Arial Rounded MT Bold','Nunito','Quicksand',Arial,sans-serif" font-weight="400" font-size="22" letter-spacing="2" fill="#6b7280">orielvinci.com</text>
</svg>
